name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

env:
  APP_DIR: "/home/ubuntu/Communiatec"
  TEMP_DIR: "/home/ubuntu/Communiatec_Temp"
  NODE_VERSION: "20"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      # ============ CHECKOUT & SETUP ============
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "Client/package-lock.json"

      # ============ CLIENT BUILD ============
      - name: Clean Client Dependencies
        working-directory: Client
        run: |
          echo "🧹 Cleaning previous builds and dependencies..."
          rm -rf node_modules package-lock.json npm-shrinkwrap.json .npmrc
          rm -rf .vite dist .next build
          echo "✅ Cleanup complete"

      - name: Configure NPM Registry
        run: |
          echo "🔧 Configuring npm for optimal builds..."
          npm config set registry https://registry.npmjs.org/
          npm config set legacy-peer-deps=true
          npm config set fetch-timeout=120000
          npm config set fetch-retry-mintimeout=20000
          npm config set fetch-retry-maxtimeout=120000
          npm config set audit=false

      - name: Generate Lock File
        working-directory: Client
        run: |
          echo "🔐 Generating package-lock.json..."
          npm install --package-lock-only --legacy-peer-deps --prefer-offline --no-audit

          if [ ! -f "package-lock.json" ]; then
            echo "❌ Failed to generate package-lock.json"
            exit 1
          fi
          echo "✅ Lock file generated"

      - name: Install Client Dependencies
        working-directory: Client
        run: |
          echo "📦 Installing client dependencies..."
          npm ci --legacy-peer-deps --prefer-offline --no-audit

          if [ ! -d "node_modules" ]; then
            echo "❌ Dependencies installation failed"
            exit 1
          fi
          echo "✅ Dependencies installed successfully"

      - name: Verify Critical Dependencies
        working-directory: Client
        run: |
          echo "🔍 Verifying critical dependencies..."

          # Create list of required packages
          REQUIRED_PACKAGES=(
            "react@18"
            "react-dom@18"
            "vite"
            "sonner"
            "@vitejs/plugin-react"
            "monaco-editor"
          )

          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            if npm list "$pkg" --depth=0 2>&1 | grep -q "$pkg"; then
              echo "✅ $pkg: installed"
            else
              echo "❌ $pkg: MISSING - installing..."
              npm install "$pkg" --legacy-peer-deps --save
            fi
          done

          echo "📋 Full dependency tree:"
          npm list --depth=0

      - name: Build Client
        working-directory: Client
        env:
          VITE_API_URL: ""
          NODE_ENV: "production"
          NODE_OPTIONS: ${{ env.NODE_OPTIONS }}
        run: |
          echo "🏗️ Building client application..."

          # Remove build cache
          rm -rf .vite dist

          # Build with verbose output
          npm run build 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}

          # Check if build succeeded
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed with status $BUILD_STATUS"
            echo "📋 Last 50 lines of build log:"
            tail -50 build.log
            exit 1
          fi

          # Verify dist folder
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "❌ Build failed: dist folder is empty or missing"
            exit 1
          fi

          DIST_SIZE=$(du -sh dist | cut -f1)
          FILE_COUNT=$(find dist -type f | wc -l)
          echo "✅ Build successful!"
          echo "📊 Dist size: $DIST_SIZE"
          echo "📋 Files created: $FILE_COUNT"

      # ============ SERVER VALIDATION ============
      - name: Validate Server Configuration
        working-directory: Server
        run: |
          echo "🔍 Validating server setup..."

          if [ ! -f "package.json" ]; then
            echo "❌ Server/package.json not found"
            exit 1
          fi

          # Find entry point
          if [ -f "server.js" ]; then
            ENTRY_POINT="server.js"
          elif [ -f "index.js" ]; then
            ENTRY_POINT="index.js"
          elif [ -f "app.js" ]; then
            ENTRY_POINT="app.js"
          else
            echo "❌ No entry point found"
            exit 1
          fi

          echo "✅ Server entry point: $ENTRY_POINT"

          # Validate key dependencies exist
          if grep -q '"express"' package.json || grep -q '"cors"' package.json; then
            echo "✅ Server dependencies defined"
          fi

      # ============ PREPARE ARTIFACTS ============
      - name: Prepare Deployment Package
        run: |
          set -e
          echo "📦 Preparing deployment package..."

          rm -rf deploy_artifact
          mkdir -p deploy_artifact/{Client,Server,scripts}

          # Copy Server (exclude node_modules and sensitive files)
          echo "📋 Packaging Server..."
          rsync -av --delete \
            --exclude='node_modules' \
            --exclude='logs' \
            --exclude='uploads' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='tmp' \
            --exclude='coverage' \
            --exclude='.DS_Store' \
            Server/ deploy_artifact/Server/

          # Copy Client build
          echo "📋 Packaging Client build..."
          rsync -av --delete Client/dist/ deploy_artifact/Client/dist/
          touch deploy_artifact/.client_updated

          # Copy deployment scripts
          if [ -d "scripts" ]; then
            echo "📋 Packaging scripts..."
            rsync -av scripts/ deploy_artifact/scripts/
            chmod +x deploy_artifact/scripts/*.sh 2>/dev/null || true
          fi

          # Create manifest
          {
            echo "Build Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "Commit: $(git rev-parse --short HEAD)"
            echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
            echo "Node Version: ${{ env.NODE_VERSION }}"
          } > deploy_artifact/MANIFEST.txt

          TOTAL_SIZE=$(du -sh deploy_artifact | cut -f1)
          echo "✅ Package prepared: $TOTAL_SIZE"

      - name: Compress Deployment Package
        run: |
          echo "📦 Compressing package..."
          tar -czf deploy_artifact.tar.gz -C . deploy_artifact

          SIZE=$(ls -lh deploy_artifact.tar.gz | awk '{print $5}')
          echo "✅ Archive created: $SIZE"

          # Verify archive
          tar -tzf deploy_artifact.tar.gz > /dev/null && echo "✅ Archive integrity verified"

      # ============ TRANSFER TO EC2 ============
      - name: Transfer to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_artifact.tar.gz"
          target: "/home/ubuntu/"
          timeout: "300s"

      # ============ DEPLOY ON EC2 ============
      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: "30m"
          script: |
            set -e

            ARCHIVE="/home/ubuntu/deploy_artifact.tar.gz"

            echo "🚀 Starting deployment process..."

            # Pre-deployment cleanup
            echo "🧹 Cleaning deployment directory..."
            rm -rf "${{ env.TEMP_DIR }}"
            mkdir -p "${{ env.TEMP_DIR }}"

            # Extract artifacts
            echo "📦 Extracting artifacts..."
            tar -xzf "$ARCHIVE" -C "${{ env.TEMP_DIR }}"
            rm "$ARCHIVE"

            # Create app directories
            mkdir -p "${{ env.APP_DIR }}"/{Client/dist,Server,scripts,logs}

            # Deploy client build
            if [ -f "${{ env.TEMP_DIR }}/deploy_artifact/.client_updated" ]; then
              echo "📋 Deploying client build..."
              rsync -av --delete "${{ env.TEMP_DIR }}/deploy_artifact/Client/dist/" "${{ env.APP_DIR }}/Client/dist/"
              rm "${{ env.APP_DIR }}/Client/dist/.gitkeep" 2>/dev/null || true
              echo "✅ Client deployed"
            fi

            # Deploy server
            echo "📋 Deploying server code..."
            rsync -av "${{ env.TEMP_DIR }}/deploy_artifact/Server/" "${{ env.APP_DIR }}/Server/"

            # Deploy scripts
            if [ -d "${{ env.TEMP_DIR }}/deploy_artifact/scripts" ]; then
              rsync -av "${{ env.TEMP_DIR }}/deploy_artifact/scripts/" "${{ env.APP_DIR }}/scripts/"
              chmod +x "${{ env.APP_DIR }}/scripts/"*.sh 2>/dev/null || true
            fi

            # Copy manifest
            cp "${{ env.TEMP_DIR }}/deploy_artifact/MANIFEST.txt" "${{ env.APP_DIR }}/MANIFEST.txt"

            # Cleanup temp
            rm -rf "${{ env.TEMP_DIR }}"

            # ===== SERVER DEPLOYMENT =====
            cd "${{ env.APP_DIR }}/Server"

            echo "🔧 Setting up server..."

            # Create .env if missing
            if [ ! -f ".env" ]; then
              echo "PORT=4000" > .env
              echo "NODE_ENV=production" >> .env
            fi

            # Install/update server dependencies
            echo "📦 Installing server dependencies..."
            npm config set legacy-peer-deps=true
            npm ci --production --no-audit --prefer-offline --legacy-peer-deps 2>&1 | tail -20 || true

            if [ ! -d "node_modules" ]; then
              echo "❌ Server dependencies installation failed"
              exit 1
            fi

            echo "✅ Server ready"

            # ===== PM2 MANAGEMENT =====
            echo "🔄 Configuring PM2..."

            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Stop existing process if running
            pm2 stop communiatec-server 2>/dev/null || true

            # Start server with PM2
            pm2 start server.js \
              --name "communiatec-server" \
              --env NODE_ENV=production \
              --max-memory-restart 500M \
              --error "${{ env.APP_DIR }}/logs/server-error.log" \
              --output "${{ env.APP_DIR }}/logs/server-out.log"

            pm2 save

            # Verify server status
            sleep 3
            if pm2 list | grep -q "communiatec-server.*online"; then
              echo "✅ Server started successfully"
              pm2 info communiatec-server | head -15
            else
              echo "⚠️ Server may not be running, checking logs..."
              pm2 logs communiatec-server --lines 30
              exit 1
            fi

            # ===== NGINX RESTART =====
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx 2>/dev/null || sudo service nginx restart || true

            echo "✅ Deployment completed successfully!"

            # Show final status
            echo "📊 Final Status:"
            echo "- Server: $(pm2 list | grep communiatec-server | awk '{print $10}')"
            echo "- Client dist size: $(du -sh ${{ env.APP_DIR }}/Client/dist | cut -f1)"
            echo "- Manifest: $(cat ${{ env.APP_DIR }}/MANIFEST.txt | head -1)"

      - name: Deployment Verification
        uses: appleboy/ssh-action@master
        if: always()
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: "10m"
          script: |
            echo "🔍 Verifying deployment..."

            # Check server process
            if pm2 list | grep -q "communiatec-server.*online"; then
              echo "✅ Server is running"
            else
              echo "❌ Server is not running"
            fi

            # Check client build
            if [ -d "${{ env.APP_DIR }}/Client/dist" ] && [ -n "$(ls -A ${{ env.APP_DIR }}/Client/dist)" ]; then
              echo "✅ Client build deployed"
            else
              echo "❌ Client build missing or empty"
            fi

            # Check recent errors
            if [ -f "${{ env.APP_DIR }}/logs/server-error.log" ]; then
              ERRORS=$(wc -l < "${{ env.APP_DIR }}/logs/server-error.log")
              echo "⚠️ Server error log entries: $ERRORS"
            fi

      - name: Workflow Complete
        if: always()
        run: |
          echo "🎉 Deployment workflow completed!"
          echo "Check EC2 instance for application status"
