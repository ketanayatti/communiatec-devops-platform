
services:
  mongo:
    image: mongo:6
    container_name: communiatec-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=communiatec_chat
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  server:
    image: node:20-alpine
    container_name: communiatec-server
    working_dir: /app
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    env_file:
      - ./Server/.env
    environment:
      - NODE_ENV=development
      - PORT=4000
      - CLIENT_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - REDIS_URL=disabled
    volumes:
      - ./Server:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  client:
    image: node:20-alpine
    container_name: communiatec-client
    working_dir: /app
    depends_on:
      - server
    ports:
      - "5173:5173"
    env_file:
      - ./Client/.env
    environment:
      - VITE_APP_SERVER_URL=http://localhost:4000
    volumes:
      - ./Client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  mongo-data:
